# =============================================================================
# Nginx Configuration for HLS Adaptive Bitrate Streaming
# Enables CORS headers and correct MIME types for HLS media files.
# =============================================================================

worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # ==========================================================================
    # Custom MIME types for DASH (not included in default nginx mime.types)
    # Note: m3u8 and ts are already defined in /etc/nginx/mime.types
    # ==========================================================================
    types {
        application/dash+xml    mpd;
        video/mp4               m4s;
    }

    server {
        listen 80;
        server_name localhost;

        root /usr/share/nginx/html;
        index index.html;

        location / {
            # CORS Headers - required for browser-based HLS players
            add_header 'Access-Control-Allow-Origin'  '*'                                always;
            add_header 'Access-Control-Allow-Methods' 'GET, HEAD, OPTIONS'              always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, User-Agent, Range' always;
            add_header 'Access-Control-Expose-Headers' 'Content-Length, Content-Range'  always;

            # Handle CORS preflight (OPTIONS) requests
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin'  '*';
                add_header 'Access-Control-Allow-Methods' 'GET, HEAD, OPTIONS';
                add_header 'Access-Control-Allow-Headers' 'Content-Type, User-Agent, Range';
                add_header 'Content-Length' 0;
                return 204;
            }

            try_files $uri $uri/ =404;
        }
    }
}
