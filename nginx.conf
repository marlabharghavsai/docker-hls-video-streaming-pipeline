# =============================================================================
# Nginx Configuration for HLS Adaptive Bitrate Streaming
# Enables CORS headers and correct MIME types for HLS media files.
# =============================================================================

worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    server {
        listen 80;
        server_name localhost;

        root /usr/share/nginx/html;
        index index.html;

        location / {
            # CORS Headers - required for browser-based HLS players
            add_header 'Access-Control-Allow-Origin'  '*'                                         always;
            add_header 'Access-Control-Allow-Methods' 'GET, HEAD, OPTIONS'                       always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, User-Agent, Range'          always;
            add_header 'Access-Control-Expose-Headers' 'Content-Length, Content-Range'           always;

            # Handle CORS preflight (OPTIONS) requests
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin'  '*';
                add_header 'Access-Control-Allow-Methods' 'GET, HEAD, OPTIONS';
                add_header 'Access-Control-Allow-Headers' 'Content-Type, User-Agent, Range';
                add_header 'Content-Length' 0;
                return 204;
            }

            try_files $uri $uri/ =404;
        }
    }

    # ==========================================================================
    # Custom MIME Types for HLS and DASH streaming
    # These override/extend the default mime.types file to ensure browsers and
    # media players receive the correct Content-Type for each file extension.
    # ==========================================================================
    types {
        # HLS
        application/vnd.apple.mpegurl    m3u8;
        video/MP2T                       ts;

        # DASH
        application/dash+xml             mpd;
        video/mp4                        m4s mp4;

        # Standard web types
        text/html                        html htm;
        text/css                         css;
        application/javascript           js;
        image/png                        png;
        image/jpeg                       jpg jpeg;
    }
}
